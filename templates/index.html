<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ldot Qualtrics API Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-soft: #f9fafb;
            --text: #111827;
            --muted: #6b7280;
            --border: #d1d5db;
            --primary: #2563eb;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 18px;
            box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
            padding: 32px;
            border: 1px solid rgba(209, 213, 219, 0.7);
        }

        h1 {
            color: var(--text);
            margin: 0;
            text-align: left;
            font-size: 2rem;
            line-height: 1.1;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand-mark {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            background: #f8fafc;
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            overflow: hidden;
        }

        .brand-mark img {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        .title-block p {
            color: var(--muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        .study-selector {
            margin-bottom: 28px;
            padding: 18px;
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .study-selector label {
            display: block;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 10px;
            font-size: 16px;
        }

        .study-selector select {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background-color: var(--surface);
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .study-selector select:hover,
        .study-selector select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            outline: none;
        }

        .workflow {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .workflow-empty {
            color: var(--muted);
            font-style: italic;
            padding: 18px;
        }

        .button-row {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            grid-template-areas:
                "action output"
                "action output";
            column-gap: 18px;
            row-gap: 10px;
            align-items: start;
            padding: 18px;
            background: var(--surface-soft);
            border-radius: 14px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
        }

        .button-row.completed {
            border-left-color: var(--success);
            background: #f0fdf4;
        }

        .button-row.error {
            border-left-color: var(--error);
            background: #fef2f2;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
            min-width: 120px;
            white-space: normal;
            line-height: 1.2;
            text-align: center;
        }

        button:hover:not(:disabled) {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
        }

        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        button.loading {
            background-color: #f59e0b;
            color: white;
        }

        .button-stack {
            grid-area: action;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }

        .button-stack button {
            width: 100%;
            min-width: 0;
            padding-inline: 14px;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .step-copy {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.45;
            max-width: 100%;
        }

        .output {
            grid-area: output;
            flex: 1;
            padding: 12px 14px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: Consolas, 'Courier New', monospace;
            font-size: 14px;
            color: var(--text);
            min-height: 50px;
            display: flex;
            align-items: center;
            word-break: break-word;
        }

        .output.empty {
            color: #9ca3af;
            font-style: italic;
        }

        .output.success {
            border-left: 3px solid var(--success);
            background-color: #f0fdf4;
            color: #166534;
        }

        .output.error {
            border-left: 3px solid var(--error);
            background-color: #fef2f2;
            color: #991b1b;
        }

        .reset-button {
            margin-top: 30px;
            width: 100%;
            background-color: #475569;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
        }

        .reset-button:hover {
            background-color: #334155;
        }

        @media (max-width: 860px) {
            .app-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .button-row {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "action"
                    "output";
            }

            button {
                width: 100%;
            }
        }

        @media (max-width: 540px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 18px;
                border-radius: 16px;
            }

            .brand-mark {
                width: 92px;
                height: 92px;
            }

            .brand-mark img {
                width: 76px;
                height: 76px;
            }

            h1 {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <div class="brand-mark">
                <img src="{{ url_for('static', filename='Ldot Qualtrics API connection.png') }}" alt="Ldot Qualtrics API connection"/>
            </div>
            <div class="title-block">
                <h1>Ldot ↔ Qualtrics API Connection Workflow</h1>
                <p>Efficiently run the Qualtrics and Ldot sync steps for the selected study</p>
            </div>
        </div>

        <div class="study-selector">
            <label for="study-select">Select Ldot Study:</label>
            <select id="study-select">
                <option value="">-- Choose a study --</option>
                {% for study_id, study_info in studies.items() %}
                <option value="{{ study_id }}">{{ study_info.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Work-unit rows are built dynamically in JS once a study is selected -->
        <div class="workflow" id="workflow">
            <div class="workflow-empty">Select a study above to load its work units.</div>
        </div>

        <button class="reset-button" onclick="resetWorkflow()">Reset Workflow</button>
    </div>

    <script>
        const state = {
            selectedStudy: null,
            workUnits: []   // [{unit_id, name}, ...] from /api/study/<id>/work_units
        };

        document.getElementById('study-select').addEventListener('change', async function() {
            state.selectedStudy = this.value;
            await loadWorkUnits();
        });

        async function loadWorkUnits() {
            const workflow = document.getElementById('workflow');
            workflow.innerHTML = '';

            if (!state.selectedStudy) {
                state.workUnits = [];
                workflow.innerHTML = '<div class="workflow-empty">Select a study above to load its work units.</div>';
                return;
            }

            workflow.innerHTML = '<div class="workflow-empty">Loading work units...</div>';

            try {
                const res = await fetch(`/api/study/${state.selectedStudy}/work_units`);
                const data = await res.json();

                if (!data.success) {
                    workflow.innerHTML = `<div class="output error">${data.message}</div>`;
                    state.workUnits = [];
                    return;
                }

                state.workUnits = data.work_units;
                workflow.innerHTML = '';
                state.workUnits.forEach(buildRow);
            } catch (error) {
                workflow.innerHTML = `<div class="output error">Failed to load work units: ${error.message}</div>`;
                state.workUnits = [];
            }
        }

        function buildRow(unit) {
            const row = document.createElement('div');
            row.className = 'button-row';
            row.id = `row-${unit.unit_id}`;

            row.innerHTML = `
                <div class="button-stack">
                    <button id="btn-${unit.unit_id}">${unit.name}</button>
                </div>
                <div class="output empty" id="output-${unit.unit_id}">No output yet</div>
            `;

            document.getElementById('workflow').appendChild(row);

            document.getElementById(`btn-${unit.unit_id}`)
                .addEventListener('click', () => executeWorkUnit(unit));
        }

        async function executeWorkUnit(unit) {
            const btn = document.getElementById(`btn-${unit.unit_id}`);
            const output = document.getElementById(`output-${unit.unit_id}`);
            const row = document.getElementById(`row-${unit.unit_id}`);

            const originalLabel = btn.textContent;
            btn.classList.add('loading');
            btn.textContent = 'Loading...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/execute_work_unit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        study_id: state.selectedStudy,
                        unit_id: unit.unit_id
                    })
                });
                const data = await response.json();

                if (data.success) {
                    output.textContent = data.message;
                    output.className = 'output success';
                    row.classList.add('completed');
                    row.classList.remove('error');
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                output.textContent = `Error: ${error.message}`;
                output.className = 'output error';
                row.classList.add('error');
                row.classList.remove('completed');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = originalLabel;
                btn.disabled = false;
            }
        }

        function resetWorkflow() {
            // Re-render all known work units back to their initial "no output yet" state.
            // No re-fetch needed since the unit list itself hasn't changed.
            state.workUnits.forEach((unit) => {
                const output = document.getElementById(`output-${unit.unit_id}`);
                const row = document.getElementById(`row-${unit.unit_id}`);
                if (!output || !row) return;

                output.textContent = 'No output yet';
                output.className = 'output empty';
                row.classList.remove('completed', 'error');
            });
        }
    </script>
</body>
</html>
